[project]
name = "pysysfan"
dynamic = ["version"]
description = "Python fan control daemon for Windows and Linux."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "click",
    "pythonnet",
    "pyyaml",
    "requests",
    "rich",
    "packaging"
]

[project.scripts]
pysysfan = "pysysfan.cli:main"
pysysfan-install-lhm = "pysysfan.install:install_lhm"
pysysfan-install-pawnio = "pysysfan.install:install_pawnio"
pysysfan-linux-install = "pysysfan.install_linux:main"

[project.optional-dependencies]
linux = [
    "pysensors>=0.0.4",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["src/pysysfan"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=6.0",
    "ruff",
]

[tool.uv]
package = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "--cov=pysysfan",
    "--cov-report=term-missing",
    "--cov-config=pyproject.toml",
]

[tool.coverage.run]
source = ["pysysfan"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_empty = true
