[project]
name = "pysysfan"
version = "0.1.0"
description = "Python fan control daemon for Windows."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "click",
    "pythonnet",
    "pyyaml",
    "requests",
    "rich"
]

[project.scripts]
pysysfan = "pysysfan.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
