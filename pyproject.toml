[project]
name = "pysysfan"
dynamic = ["version"]
description = "Python fan control daemon for Windows."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "click",
    "pythonnet",
    "pyyaml",
    "requests",
    "rich",
    "packaging"
]

[project.scripts]
pysysfan = "pysysfan.cli:main"
pysysfan-install-lhm = "pysysfan.install:install_lhm"
pysysfan-install-pawnio = "pysysfan.install:install_pawnio"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["src/pysysfan"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff",
]

[tool.uv]
package = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
