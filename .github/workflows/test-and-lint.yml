name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting and lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github ."
      - name: Check formatting
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."

  type-check:
    name: Type check
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra gui

      - name: Run ty
        run: uv run ty check --output-format=github

  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra gui
      - name: Run tests
        run: |
          $pytestOutput = "pytest_output.txt"
          uv run pytest tests/ 2>&1 | Tee-Object -FilePath $pytestOutput
          $pytestExitCode = $LASTEXITCODE

          if (Test-Path $pytestOutput) {
            echo "## Coverage Summary" >> $env:GITHUB_STEP_SUMMARY
            echo '```text' >> $env:GITHUB_STEP_SUMMARY
            Select-String -Path $pytestOutput -Pattern '^Name.*Stmts','^TOTAL' | ForEach-Object { $_.Line } >> $env:GITHUB_STEP_SUMMARY
            echo '```' >> $env:GITHUB_STEP_SUMMARY
          }

          if ($pytestExitCode -ne 0) {
            exit $pytestExitCode
          }
        shell: pwsh
